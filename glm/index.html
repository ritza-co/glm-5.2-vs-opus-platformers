<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>WebGL Platformer</title>
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #8dbcef; overflow: hidden; font-family: -apple-system, system-ui, sans-serif; }
  #glcanvas { display: block; width: 100vw; height: 100vh; touch-action: none; }
  #hud {
    position: fixed; top: 8px; left: 8px; padding: 6px 10px;
    background: rgba(0,0,0,0.45); color: #d6f0ff; border-radius: 6px;
    font-size: 12px; font-family: monospace; pointer-events: none; z-index: 10; white-space: pre;
  }
  #score {
    position: fixed; top: 8px; right: 10px; padding: 6px 12px;
    background: rgba(0,0,0,0.5); color: #ffe27a; border-radius: 6px;
    font-size: 16px; font-weight: bold; z-index: 10; pointer-events: none;
  }
  #win {
    position: fixed; inset: 0; display: none; align-items: center; justify-content: center;
    flex-direction: column; background: rgba(0,0,0,0.55); color: #fff;
    font-size: 28px; text-align: center; white-space: pre-line; z-index: 20; padding: 20px;
  }
  #controls {
    position: fixed; bottom: 8px; left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,0.4); color: #eaf6ff; border-radius: 6px; padding: 6px 12px;
    font-size: 12px; z-index: 10; pointer-events: none; white-space: nowrap;
  }
  #loading {
    position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
    background: #8dbcef; color: #1b3a5b; font-size: 22px; z-index: 30;
  }
  #error {
    position: fixed; inset: 0; display: none; align-items: center; justify-content: center;
    background: #5b1b1b; color: #ffd0d0; font-size: 18px; padding: 30px; z-index: 40; text-align: center;
  }
</style>
</head>
<body>
<canvas id="glcanvas"></canvas>
<div id="loading">Loading 3D platformer…</div>
<div id="hud" style="display:none"></div>
<div id="score" style="display:none">Coins: 0 / 0</div>
<div id="win"></div>
<div id="controls">WASD/Arrows move · Space jump · Shift sprint · Q/E or drag mouse orbit · Wheel zoom · R restart · F3 debug</div>
<div id="error"></div>

<script src="js/mat4.js"></script>
<script src="js/glb.js"></script>
<script src="js/renderer.js"></script>
<script src="js/game.js"></script>
<script>
  window.addEventListener("load", async () => {
    try {
      await GAME.init();
      document.getElementById("loading").style.display = "none";
      document.getElementById("hud").style.display = "block";
      document.getElementById("score").style.display = "block";
    } catch (e) {
      console.error(e);
      document.getElementById("loading").style.display = "none";
      const err = document.getElementById("error");
      err.textContent = "Error: " + (e && e.message ? e.message : e);
      err.style.display = "flex";
    }
  });
</script>
</body>
</html>
